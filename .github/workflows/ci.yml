name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: Lint + Typecheck + Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn check

  real-e2e:
    name: Real API E2E (trusted runs)
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs:
      - check
    env:
      TRANSLOADIT_KEY: ${{ secrets.TRANSLOADIT_KEY }}
      TRANSLOADIT_SECRET: ${{ secrets.TRANSLOADIT_SECRET }}
      TRANSLOADIT_ENDPOINT: ${{ secrets.TRANSLOADIT_ENDPOINT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: yarn install --immutable
      - name: Skip if secrets are not configured
        if: env.TRANSLOADIT_KEY == '' || env.TRANSLOADIT_SECRET == ''
        run: echo "Skipping real E2E; TRANSLOADIT_KEY/TRANSLOADIT_SECRET are not configured."
      - name: Run real API E2E
        if: env.TRANSLOADIT_KEY != '' && env.TRANSLOADIT_SECRET != ''
        run: yarn test:real

  pack:
    name: Package Smoke Test
    runs-on: ubuntu-latest
    needs:
      - check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn pack
      - uses: actions/upload-artifact@v4
        with:
          name: package
          path: '*.tgz'
